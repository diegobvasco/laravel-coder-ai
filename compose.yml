services:
  app:
    build:
      context: ./docker
      dockerfile: Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
        NODE_VERSION: ${NODE_VERSION:-21}
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: ${CONTAINER_NAME:-}
    image: 'php-node:${PHP_VERSION:-8.3}-${NODE_VERSION:-21}'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '${OPENCODE_PORT:-4096}:${OPENCODE_PORT:-4096}'
    volumes:
      - '.:/var/www/html'
      - '${OPENCODE_SHARE_PATH:-opencode-share}:/home/developer/.local/share/opencode'
      - '${OPENCODE_STATE_PATH:-opencode-state}:/home/developer/.local/state/opencode'
      - '${OPENCODE_GLOBAL_CONFIG_PATH:-~/.opencode}:/home/developer/.opencode'
      - '${OPENCODE_CREDENTIALS_FILE:-~/.local/share/opencode/auth.json}:/home/developer/.local/share/opencode/auth.json'
      - '${SSH_PATH:-~/.ssh}:/home/developer/.ssh:ro'
    environment:
      COMPOSER_MEMORY_LIMIT: '-1'
      OPENCODE_SERVER_USERNAME: '${OPENCODE_SERVER_USERNAME:-}'
      OPENCODE_SERVER_PASSWORD: '${OPENCODE_SERVER_PASSWORD:-}'
    command: >
      opencode web
      --hostname 0.0.0.0
      --port ${OPENCODE_PORT:-4096}
      --mdns
      --mdns-domain ${OPENCODE_DOMAIN:-opencode.local}
      --cors ${OPENCODE_CORS:-*}
    networks:
      - proxy

networks:
  proxy:
    external: ${PROXY_NETWORK_EXTERNAL:-false}
    name: ${PROXY_NETWORK:-proxy}
volumes:
  opencode-state:
    driver: local
  opencode-share:
    driver: local